services:
  notediscovery:
    build: .
    container_name: notediscovery
    ports:
      - "8001:8000"          # Access at :8001 on the host
    volumes:
      # Your Obsidian vault — mounted read/write so you can edit notes in the UI
      - /home/ftr/Documents/Vault:/app/data
      # Custom config (enables auth, sets app name, etc.)
      - ./config.yaml:/app/config.yaml
      # Custom themes directory — add your own .css files here
      - ./themes:/app/themes
      # Plugins directory
      - ./plugins:/app/plugins
      # Locales
      - ./locales:/app/locales
      # Frontend — live edits to index.html / static_custom without rebuild
      - ./frontend:/app/frontend
      # VERSION — bumping this file busts the SW cache without rebuild
      - ./VERSION:/app/VERSION
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s

